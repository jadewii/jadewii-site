<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atari Synth Station</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Press Start 2P', 'VT323', monospace;
    touch-action: manipulation;
}

body {
    background-color: #ffffff; 
    color: #333333;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 5px;
    cursor: default;
    overflow: hidden;
    background-image: none;
    margin: 0;
}

h3 {
    font-size: 13px;
    margin: 0 0 8px 0;
    border-bottom: 1px solid #8b5cf6;
    padding-bottom: 4px;
    color: #8b5cf6;
    text-transform: uppercase;
    letter-spacing: 1px;
}
.synth-container {
    width: 100%;
    max-width: 1073px;
    max-height: 856px;
    aspect-ratio: 1.024;
    background-color: #f5f5f5; 
    border-radius: 0px;
    border: 4px solid #8b5cf6;
    padding: 8px 15px;
    box-shadow: none;
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 8px;
    margin: 0 auto;
    overflow: hidden;
}

.control-panel {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    overflow: hidden;
    max-height: calc(85vh - 24px);
}

@media (max-width: 768px) {
    .control-panel {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        max-height: calc(85vh - 24px);
    }
    
    .oscillator-section {
        max-height: 40vh;
    }
}

.oscillator-section {
    background-color: #ffffff; 
    padding: 8px;
    border-radius: 0px;
    border: 2px solid #9ca3af;
    box-shadow: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    max-height: 100%;
}

.sequencer-section {
    background-color: #ffffff;
    padding: 8px;
    border-radius: 0px;
    border: 2px solid #9ca3af;
    box-shadow: none;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    max-height: 100%;
    min-height: 550px;
}

.window-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 10px;
    background-color: #8b5cf6;
    color: #ffffff;
    font-weight: bold;
    border: none;
}

.window-title span {
    flex: 1;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    letter-spacing: 1px;
}
.control-group {
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
}

label {
    display: inline-block;
    margin-right: 8px;
    font-weight: normal;
    color: #333333;
    min-width: 25px;
}

.win95-button {
    background-color: #e0e0e0; 
    border: 2px solid #9ca3af;
    border-radius: 0;
    padding: 8px;
    font-size: 13px;
    color: #333333;
    cursor: pointer;
    min-width: 40px;
    min-height: 40px;
    font-family: 'Press Start 2P', monospace;
    transition: all 0.2s ease;
    box-shadow: none;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
}

.win95-button:hover {
    background-color: #d1d5db;
    transform: scale(1.05);
}

.win95-button.active {
    background-color: #ec4899;
    color: #ffffff;
}

.instrument-button, .arp-button {
    border-radius: 0;
    min-height: 50px;
    min-width: 50px;
}

.instrument-button.muted {
    background-color: #6b7280;
    color: #d1d5db;
    opacity: 0.6;
}

.instrument-button.muted:hover {
    background-color: #9ca3af;
}

.octave-button {
    border-radius: 0;
    width: 30px;
    height: 30px;
    min-width: 30px;
    min-height: 30px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.pattern-memory {
    margin: 8px 0;
    width: 100%;
    background-color: #ffffff;
    border-radius: 0px;
    border: 2px solid #9ca3af;
    padding: 8px;
    box-shadow: none;
}

input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    background: #e0e0e0;
    border: 1px solid #9ca3af;
    height: 8px;
    border-radius: 4px;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    background: #8b5cf6;
    border: none;
    border-radius: 50%;
}

.value-display {
    color: #333333;
    font-family: 'Press Start 2P', monospace;
}

.sequencer-controls {
    display: flex;
    flex-direction: row;
    gap: 8px;
    margin-bottom: 0.25in;
    flex-wrap: wrap;
    align-items: flex-start;
}

.seq-button-container {
    margin-right: 0;
}

#play-button, #stop-button {
    min-width: 60px;
    min-height: 40px;
    width: 60px;
    height: 40px;
}

#random-button, #clear-button, #clear-all-button {
    height: 40px;
    min-height: 40px;
}

.tempo-swing-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-right: 15px;
}
.sequence-grid {
    display: grid;
    grid-template-columns: repeat(32, 1fr) 1fr;
    grid-template-rows: repeat(12, 1fr);
    gap: 2px;
    border-radius: 8px;
    background-color: #ffffff; 
    border: 2px solid #9ca3af;
    padding: 5px;
    height: 400px;
    margin-bottom: 5px;
    box-shadow: none;
    flex: 1;
    min-height: 0;
    overflow: auto;
    width: 100%;
    box-sizing: border-box;
}

.sequence-grid.instrument-grid {
    background-color: #ffffff;
    border: 2px solid #9ca3af;
    padding: 8px;
    border-radius: 8px;
}

.grid-cell {
    background-color: #f9fafb;
    border: 1px solid #d1d5db;
    border-radius: 2px;
    aspect-ratio: 1;
    position: relative;
    width: 100%;
    height: 100%;
    min-width: 12px;
    min-height: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: #6b7280;
    box-sizing: border-box;
    margin: 0;
    transform: none;
    overflow: hidden;
    cursor: pointer;
}

.grid-cell.instrument-cell {
    background-color: #f9fafb;
    border: 1px solid #d1d5db;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.1s ease;
}

.grid-cell.instrument-cell:hover {
    background-color: #e5e7eb;
    border-color: #8b5cf6;
}

.grid-cell.instrument-cell.sharp-note {
    background-color: #e5e7eb;
    color: #ec4899;
}

.grid-cell.instrument-cell.natural-note {
    background-color: #f9fafb;
    color: #8b5cf6;
}

.grid-cell.instrument-cell.active {
    background-color: #8b5cf6;
    color: #ffffff;
    transform: scale(1.1);
    border-color: #ec4899;
}

.grid-cell.active {
    background-color: #8b5cf6;
    color: #ffffff;
    border-color: #ec4899;
}

.grid-cell.toggled {
    background-color: #8b5cf6;
    color: #ffffff;
}

.grid-cell.green {
    background-color: #10b981;
    color: #ffffff;
}

.grid-cell.beat-marker {
    border-left: 2px solid #f97316;
}

.grid-cell.playing {
    transform: scale(1.1);
    border-color: #10b981 !important;
}

.grid-cell.selected {
    border: 2px solid #ffffff;
}

.grid-cell.synth-ghost {
    background-color: rgba(255, 102, 0, 0.3);
}

.grid-cell.bass-ghost {
    background-color: rgba(102, 255, 0, 0.3);
}

.grid-cell.keys-ghost {
    background-color: rgba(255, 204, 0, 0.3);
}

.drum-machine-grid {
    display: grid;
    grid-template-columns: 80px repeat(16, minmax(18px, 1fr)) minmax(18px, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 2px;
    border-radius: 8px;
    background-color: #ffffff; 
    border: 2px solid #9ca3af;
    padding: 5px;
    height: 400px;
    margin-bottom: 5px;
    box-shadow: none;
    flex: 1;
    min-height: 0;
    overflow-x: auto;
    width: 100%;
    box-sizing: border-box;
}

.grid-cell.drum-machine-cell {
    padding-bottom: 0; 
    min-width: 32px;
    min-height: 32px;
    max-width: 32px;
    max-height: 32px;
    width: 32px;
    height: 32px;
    background-color: #f9fafb;
    border: 2px solid #9ca3af;
    border-radius: 50%;
    aspect-ratio: 1 / 1;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    cursor: pointer;
    transition: background-color 0.12s, border-color 0.12s, transform 0.1s;
}

.drum-machine-label {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333333;
    font-size: 12px;
    text-transform: uppercase;
    background-color: #f9fafb;
    border: 1px solid #d1d5db;
    border-radius: 4px;
}
.instrument-controls h3 {
    font-size: 13px;
    margin: 0 0 8px 0;
    border-bottom: 1px solid #8b5cf6;
    padding-bottom: 4px;
    color: #8b5cf6;
    text-transform: uppercase;
}

.instrument-button {
    font-size: 14px;
    font-weight: bold;
    padding: 8px 4px;
    width: 100%;
    margin-bottom: 4px;
    border-radius: 0px;
    border: 2px solid #9ca3af;
    height: 40px;
    background-color: #f9fafb;
    color: #333333;
}

.octave-controls {
    display: flex;
    gap: 4px;
}

.octave-button {
    padding: 4px;
    min-width: 25px;
    font-size: 12px;
    border: 1px solid #9ca3af;
    background-color: #f9fafb;
    color: #333333;
}

.instrument-button.active {
    background-color: #ec4899;
    color: #ffffff;
}
.pattern-memory {
    margin: 0;
    margin-bottom: 0;
    width: auto;
    background-color: #ffffff;
    border-radius: 8px;
    border: 2px solid #9ca3af;
    padding: 8px;
    box-shadow: none;
    flex-shrink: 0;
}

.pattern-button {
    background-color: #f9fafb;
    color: #333333;
    border: 2px solid #9ca3af;
    border-radius: 0;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.pattern-button.has-content {
    background-color: #c4b5fd;
    color: #5b21b6;
    border-color: #8b5cf6;
}

.pattern-button.has-content.active {
    background-color: #8b5cf6;
    color: #ffffff;
}

.pattern-buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
}
@keyframes pulse-change {
    0% { transform: none; box-shadow: none; }
    50% { background-color: #06b6d4; color: #ffffff; border-color: #ffffff; }
    100% { transform: none; box-shadow: none; }
}

@keyframes glow {
    0% { border-color: #8b5cf6; }
    50% { border-color: #ec4899; }
    100% { border-color: #8b5cf6; }
}

/* Add Atari-like scanline effect to the entire app */
.synth-container::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,0.15) 50%);
    background-size: 100% 2px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
}
.tr-sequencer-container {
    display: none;
    width: 100%;
    margin-top: 0;
    background-color: #ffffff;
    border: 2px solid #9ca3af;
    padding: 8px 20px;
    border-radius: 0px;
    flex: 1;
    min-height: 500px;
    max-height: 100%;
    overflow-x: visible;
    min-width: 800px;
}

.tr-sequencer-container.visible {
    display: flex;
    flex-direction: column;
}

.tr-row {
  display: flex;
  margin-bottom: 4px;
  align-items: center;
  gap: 8px;
}

.tr-label {
  width: 70px;
  font-size: 12px;
  color: #333333;
  text-transform: uppercase;
  flex-shrink: 0;
  font-weight: bold;
}

.tr-controls-row {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.tr-control-btn {
  width: 32px;
  height: 32px;
  background-color: #f9fafb;
  border: 2px solid #9ca3af;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: bold;
  color: #333333;
  transition: all 0.2s ease;
  /* ensure it's a circle, force aspect ratio */
  aspect-ratio: 1 / 1;
  box-sizing: border-box;
}

.tr-control-btn:hover {
  background-color: #e5e7eb;
  transform: scale(1.1);
}

.tr-control-btn.active {
  background-color: #ec4899;
  color: #ffffff;
}

.tr-mute-btn.active {
  background-color: #ef4444;
}

.tr-solo-btn.active {
  background-color: #f59e0b;
}

.tr-direction-btn.active {
  background-color: #06b6d4;
}

.tr-direction-btn.backward {
  background-color: #3b82f6;
  color: #ffffff;
}

.tr-direction-btn.reverse {
  background-color: #f97316;
  color: #ffffff;
}

.tr-timesig-btn.active {
  background-color: #8b5cf6;
}

.tr-steps {
  display: flex;
  flex: 0 0 auto;
  gap: 6px;
  padding-bottom: 5px;
  overflow-x: visible;
  min-width: auto;
  max-width: none;
}

.tr-step {
  width: 32px;
  height: 32px;
  background-color: #f9fafb;
  border: 2px solid #9ca3af;
  border-radius: 50%;
  cursor: pointer;
  flex: 0 0 32px;
  aspect-ratio: 1 / 1;
  transition: all 0.1s;
  box-sizing: border-box;
  margin: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tr-step.active {
  background-color: #ec4899;
}

.tr-step.toggled {
  background-color: #8b5cf6 !important;
}

.tr-step.green {
  background-color: #10b981 !important;
}

.tr-step.playing {
  border-color: #10b981 !important;
  border-width: 3px;
  transform: scale(1.1);
}

.tr-controls {
  display: flex;
  flex-direction: column;
  margin-top: 8px;
}

.tr-divider {
  margin: 0;
}

.tr-indicators {
    display: flex;
    gap: 8px;
    padding: 8px;
    background-color: #ffffff;
    border: 2px solid #9ca3af;
    border-radius: 8px;
    margin-bottom: 8px;
    justify-content: center;
    flex-wrap: wrap;
}

.tr-indicator {
  width: 20px;
  height: 20px;
  background-color: #f9fafb;
  border: 1px solid #9ca3af;
  border-radius: 50%;
  flex-shrink: 0;
  aspect-ratio: 1 / 1;
}

.tr-indicator.active {
  background-color: #06b6d4;
}

.tr-random-btn.active {
  background-color: #8b5cf6;
}

.tr-clear-btn.active {
  background-color: #ef4444;
}

.tr-random-slider {
    width: 80px;
    height: 20px;
    margin: 0 6px 0 0;
    -webkit-appearance: none;
    appearance: none;
    background: #e0e0e0;
    border: 1px solid #9ca3af;
    border-radius: 2px;
    outline: none;
}

.tr-random-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 18px;
    background: #8b5cf6;
    border: none;
    border-radius: 2px;
    cursor: pointer;
}

.tr-random-slider::-moz-range-thumb {
    width: 12px;
    height: 18px;
    background: #8b5cf6;
    border: none;
    border-radius: 2px;
    cursor: pointer;
}

.tr-volume-slider {
    width: 80px;
    height: 20px;
    margin: 0 6px 0 12px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(to right, #8b5cf6 0%, #8b5cf6 70%, #e0e0e0 70%, #e0e0e0 100%);
    border: 1px solid #9ca3af;
    border-radius: 2px;
    outline: none;
}

.tr-volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 18px;
    background: #8b5cf6;
    border: none;
    border-radius: 2px;
    cursor: pointer;
}

.tr-volume-slider::-moz-range-thumb {
    width: 12px;
    height: 18px;
    background: #8b5cf6;
    border: none;
    border-radius: 2px;
    cursor: pointer;
}

.drum-machine-label.muted {
    background-color: #d1d5db;
    color: #6b7280;
    text-decoration: line-through;
}

.drum-machine-label.playing {
    background-color: #f97316;
    color: #ffffff;
}

/* Fix drum-machine-grid so all 16 step circles are always visible and perfectly round. */
.drum-machine-grid {
    display: grid;
    grid-template-columns: 80px repeat(16, 1fr); /* ensure 16 steps always shown */
    grid-template-rows: repeat(8, 1fr);
    gap: 4px;
    border-radius: 8px;
    background-color: #ffffff; 
    border: 2px solid #9ca3af;
    padding: 8px;
    height: 400px;
    margin-bottom: 15px;
    box-shadow: none;
    flex: 1;
    min-height: 0;
    overflow-x: auto;
    width: 100%;
    box-sizing: border-box;
}

/* All drum step circles, make perfect, consistent with tr-step size and layout */
.grid-cell.drum-machine-cell {
    width: 32px;
    height: 32px;
    min-width: 32px;
    min-height: 32px;
    max-width: 32px;
    max-height: 32px;
    background-color: #f9fafb;
    border: 2px solid #9ca3af;
    border-radius: 50%;
    box-sizing: border-box;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin: 0 auto;
    transition: background-color 0.12s, border-color 0.12s, transform 0.1s;
}

/* Color states for drum grid circles, matching tr-step */
.grid-cell.drum-machine-cell.active {
    background-color: #ec4899;
}

.grid-cell.drum-machine-cell.toggled {
    background-color: #8b5cf6 !important;
}

.grid-cell.drum-machine-cell.green {
    background-color: #10b981 !important;
}

.grid-cell.drum-machine-cell.playing {
    border-color: #10b981 !important;
    border-width: 3px;
    transform: scale(1.1);
}

/* Selected state matches tr-step style */
.grid-cell.drum-machine-cell.selected {
    box-shadow: 0 0 0 2px #f97316;
    border-color: #f97316;
}

/* Beat marker styling: subtle color on every 4th step */
.grid-cell.drum-machine-cell.beat-marker {
    box-shadow: 1px 0 0 0 #f97316;
    border-left: 2px solid #f97316;
}

/* Drum machine labels: Adjust for alignment and box so label circles match grid feel */
.drum-machine-label {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333333;
    font-size: 14px;
    text-transform: uppercase;
    background-color: #f9fafb;
    border: 2px solid #9ca3af;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    min-width: 32px;
    min-height: 32px;
    max-width: 32px;
    max-height: 32px;
    aspect-ratio: 1 / 1;
    margin: 0 auto;
    box-sizing: border-box;
}

.drum-machine-label.muted {
    background-color: #d1d5db;
    color: #6b7280;
    text-decoration: line-through;
}

.drum-machine-label.playing {
    background-color: #f97316;
    color: #ffffff;
}

.tr-label-button {
  background-color: #f9fafb;
  border: 2px solid #9ca3af;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.1s;
  width: 32px;
  height: 32px;
  min-width: 32px;
  min-height: 32px;
  max-width: 32px;
  max-height: 32px;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  margin: 0;
  box-sizing: border-box;
}

.tr-label-button:hover {
  background-color: #e5e7eb;
  transform: scale(1.1);
}

.tr-label-button.active {
  background-color: #8b5cf6;
  color: #ffffff;
  border-color: #8b5cf6;
}

.tr-effects-section {
  margin-top: 12px;
  margin-bottom: 0.25in;
  padding: 8px;
  background-color: #f9fafb;
  border: 2px solid #9ca3af;
  border-radius: 4px;
  width: 100%;
  max-width: none;
}

.tr-effects-section h4 {
  margin: 0 0 8px 0;
  font-size: 11px;
  color: #8b5cf6;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid #8b5cf6;
  padding-bottom: 2px;
}

.effects-controls {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 8px;
  max-width: 100%;
  overflow: hidden;
}

.effect-control {
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: 0;
  max-width: 100%;
  min-height: 32px;

  // modules/synth-engine/notes.js
  function noteToFrequency(note) {
    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const noteName = note.slice(0, -1);
    const octave = parseInt(note.slice(-1));
    const noteIndex = notes.indexOf(noteName);
    if (noteIndex === -1) return 440;
    const keyNumber = noteIndex + octave * 12;

    } catch (error) {
      console.warn(`Error stopping note ${note}:`, error);

        // 8 rows x 16 columns
        drums3: Array(128).fill(false),
        // 8 rows x 16 columns
        drums4: Array(128).fill(false)
        // 8 rows x 16 columns
      };
      this.currentInstrument = "synth";
      this.selectedCellIndex = -1;
      this.sequencerOctaveOffsets = {
        synth: 0,
        bass: 0,
        keys: 0,
        drums: 0,
        // Not really used but kept for consistency
        drums2: 0,
        drums3: 0,
        drums4: 0
      };
      this.mutedDrums = {
        drums: {},
        drums2: {},
        drums3: {},
        drums4: {}
      };
      this.drumDirections = {
        drums: {},
        drums2: {},
        drums3: {},
        drums4: {}
      };
      this.currentPatternIndex = 0;
      this.grid = new grid_default(this);
      this.player = new playback_default(this);
      this.patterns = new patterns_default(this);
      this.navigation = new navigation_default(this);
      this.memory = new memory_default(this);
      this.ui = new ui_default(this);
      this.trSequencer = new tr_sequencer_default(this);
      window.sequencer = this;
    }
    setupSequencer() {
      this.ui.setupControls();
      this.memory.setupPatternButtons();
      this.grid.createGrid();
      this.navigation.setupKeyboardNavigation();
      this.trSequencer.initialize();
    }
    // Delegator methods that pass calls to appropriate modules
    startSequencer() {
      if (this.synthEngine.audioContext.state !== "running") {
        this.synthEngine.audioContext.resume().then(() => {
          this.player.startSequencer();
        }).catch((error) => {
          console.error("Failed to resume audio context:", error);
          this.player.startSequencer();
        });
      } else {
        this.player.startSequencer();
      }
    }
    stopSequencer() {
      this.player.stopSequencer();
    }
    generateRandomSequence() {
      this.patterns.generateRandomSequence();
      this.memory.savePatternWithUI(this.currentPatternIndex);
    }
    clearSequencer() {
      this.patterns.clearSequencer();
      this.memory.savePatternWithUI(this.currentPatternIndex);
    }
    toggleSequencerStep(index) {
      this.ui.toggleSequencerStep(index);
    }
    setCurrentInstrument(instrument) {
      this.selectedCellIndex = -1;
      this.currentInstrument = instrument;
      this.grid.createGrid();
      if (this.trSequencer) {
        const isDrumInstrument = instrument.startsWith("drums");
        this.trSequencer.toggleVisibility(isDrumInstrument);
        if (isDrumInstrument) {
          this.trSequencer.updateFromSequencer();
        }
      }
    }
    addNoteToSequencer(note) {
      if (this.recording) {
        const noteName = note.slice(0, -1);
        const octave = parseInt(note.slice(-1));
        if ((octave === 3 || octave === 4) && !noteName.includes("#")) {
          const noteMap = {
            "C3": 11,
            "D3": 10,
            "E3": 9,
            "F3": 8,
            "G3": 7,
            "A3": 6,
            "B3": 5,
            "C4": 4,
            "D4": 3,
            "E4": 2,
            "F4": 1,
            "G4": 0
          };
          if (noteMap[note] !== void 0) {
            const row = noteMap[note];
            const column = this.currentStep % 32;
            const cellIndex = row * 32 + column;
            for (let r = 0; r < 12; r++) {
              const existingIndex = r * 32 + column;
              this.sequencerTracks[this.currentInstrument][existingIndex] = 0;
            }
            this.sequencerTracks[this.currentInstrument][cellIndex] = 1;
            this.grid.createGrid();
            this.memory.savePatternWithUI(this.currentPatternIndex);
            this.currentStep = (this.currentStep + 1) % 32;
          }
        }
      }
    }
    shiftSequenceOctave(direction, forceInstrument = null) {
      const instrument = forceInstrument || this.currentInstrument;
      if (instrument === "drums") {
        if (direction === "up") {
          this.sequencerOctaveOffsets.drums = Math.min(2, this.sequencerOctaveOffsets.drums + 1);
        } else {
          this.sequencerOctaveOffsets.drums = Math.max(0, this.sequencerOctaveOffsets.drums - 1);
        }
        this.grid.createGrid();
        console.log(`Drum set: ${this.sequencerOctaveOffsets.drums}`);
        return;
      }
      const oldOffset = this.sequencerOctaveOffsets[instrument] || 0;
      if (direction === "up") {
        this.sequencerOctaveOffsets[instrument] = Math.min(2, this.sequencerOctaveOffsets[instrument] + 1);
      } else {
        this.sequencerOctaveOffsets[instrument] = Math.max(-2, this.sequencerOctaveOffsets[instrument] - 1);
      }
      const newOffset = this.sequencerOctaveOffsets[instrument];
      if (this.synthEngine.arpeggiators && this.synthEngine.arpeggiators[instrument] && this.synthEngine.arpeggiators[instrument].enabled) {
        const baseOctave = 4;
        const oldOctave = baseOctave + oldOffset;
        const newOctave = baseOctave + newOffset;
      }
      this.memory.savePatternWithUI(this.currentPatternIndex);
      console.log(`${instrument} octave offset: ${this.sequencerOctaveOffsets[instrument]}`);
    }
    toggleDrumMute(drumSound) {
      const currentDrumMachine = this.currentInstrument.startsWith("drums") ? this.currentInstrument : "drums";
      if (!this.mutedDrums[currentDrumMachine]) {
        this.mutedDrums[currentDrumMachine] = {};
      }
      this.mutedDrums[currentDrumMachine][drumSound] = !this.mutedDrums[currentDrumMachine][drumSound];
      console.log(`${drumSound} ${this.mutedDrums[currentDrumMachine][drumSound] ? "muted" : "unmuted"} on ${currentDrumMachine}`);
      return this.mutedDrums[currentDrumMachine][drumSound];
    }
    isDrumMuted(drumSound, drumMachine = null) {
      const targetDrumMachine = drumMachine || (this.currentInstrument.startsWith("drums") ? this.currentInstrument : "drums");
      return this.mutedDrums[targetDrumMachine] && this.mutedDrums[targetDrumMachine][drumSound] === true;
    }
    togglePendulumMode() {
      this.isPendulumMode = !this.isPendulumMode;
      this.currentStep = 0;
      this.direction = 1;
      console.log(`Pendulum mode ${this.isPendulumMode ? "enabled" : "disabled"}`);
    }
    // Delegator methods that pass calls to appropriate modules
  };
  var sequencer_default = Sequencer;

  // script.js
  window.addEventListener("DOMContentLoaded", () => {
    const synthEngine = new synth_engine_default();
    synthEngine.setInstrument("drums2");
    const ui = new synth_ui_default(synthEngine);
    const keyboard = new keyboard_default(synthEngine);
    const sequencer = new sequencer_default(synthEngine);
    window.keyboard = keyboard;
    ui.initUI();
    setupDrumEffectsControls(synthEngine);
    keyboard.setupKeyboard();
    keyboard.setupKeyboardEvents();
    sequencer.setupSequencer();
    sequencer.setCurrentInstrument("drums2");
    ui.instrumentControls.updateButtonStates("drums2");
    sequencer.memory.savePattern(0);
    sequencer.currentPatternIndex = 0;
    document.querySelector('.pattern-button[data-pattern="1"]').classList.add("active");
    document.querySelector('.pattern-button[data-pattern="1"]').classList.add("saved");
    document.getElementById("clear-all-button").addEventListener("click", () => {
      sequencer.sequencerTracks.drums = Array(128).fill(false);
      sequencer.sequencerTracks.drums2 = Array(128).fill(false);
      sequencer.sequencerTracks.drums3 = Array(128).fill(false);
      sequencer.sequencerTracks.drums4 = Array(128).fill(false);
      if (sequencer.sequencerRunning) {
        sequencer.stopSequencer();
      }
      sequencer.grid.createGrid();
      if (sequencer.trSequencer) {
        sequencer.trSequencer.updateFromSequencer();
      }
      sequencer.memory.savePatternWithUI(sequencer.currentPatternIndex);
    });
    const chaosButton = document.getElementById("chaos-pattern-button");
    if (chaosButton) {
      let updateChaosButton = function() {
        chaosButton.classList.remove("chaos-pink", "chaos-purple", "chaos-green");
        chaosButton.classList.add(colors[chaosIndex].className);
      };
      const colors = [
        { val: true, className: "chaos-pink" },
        // Pink (true)
        { val: "purple", className: "chaos-purple" },
        // Purple ('purple')
        { val: "green", className: "chaos-green" }
        // Green ('green')
      ];
      let chaosIndex = 0;
      updateChaosButton();
      chaosButton.addEventListener("click", () => {
        chaosIndex = (chaosIndex + 1) % colors.length;
        updateChaosButton();
        if (chaosIndex === 1 && sequencer.currentInstrument.startsWith("drums")) {
          const currentTrack = sequencer.currentInstrument;
          for (let i = 0; i < sequencer.sequencerTracks[currentTrack].length; i++) {
            if (sequencer.sequencerTracks[currentTrack][i] === true) {
              if (Math.random() < 0.5) {
                sequencer.sequencerTracks[currentTrack][i] = "purple";
              }
            }
          }
          sequencer.grid.createGrid();
          if (sequencer.trSequencer) {
            sequencer.trSequencer.updateFromSequencer();
          }
          sequencer.memory.savePatternWithUI(sequencer.currentPatternIndex);
        }
        if (chaosIndex === 2 && sequencer.currentInstrument.startsWith("drums")) {
          const currentTrack = sequencer.currentInstrument;
          for (let i = 0; i < sequencer.sequencerTracks[currentTrack].length; i++) {
            const currentStep = sequencer.sequencerTracks[currentTrack][i];
            if (currentStep === true || currentStep === "purple") {
              const rand = Math.random();
              if (rand < 0.33) {
                sequencer.sequencerTracks[currentTrack][i] = true;
              } else if (rand < 0.66) {
                sequencer.sequencerTracks[currentTrack][i] = "purple";
              } else {
                sequencer.sequencerTracks[currentTrack][i] = "green";
              }
            }
          }
          sequencer.grid.createGrid();
          if (sequencer.trSequencer) {
            sequencer.trSequencer.updateFromSequencer();
          }
          sequencer.memory.savePatternWithUI(sequencer.currentPatternIndex);
        }
        if (chaosIndex === 0 && sequencer.currentInstrument.startsWith("drums")) {
          const currentTrack = sequencer.currentInstrument;
          for (let i = 0; i < sequencer.sequencerTracks[currentTrack].length; i++) {
            const currentStep = sequencer.sequencerTracks[currentTrack][i];
            if (currentStep === true || currentStep === "purple" || currentStep === "green") {
              sequencer.sequencerTracks[currentTrack][i] = true;
            }
          }
          sequencer.grid.createGrid();
          if (sequencer.trSequencer) {
            sequencer.trSequencer.updateFromSequencer();
          }
          sequencer.memory.savePatternWithUI(sequencer.currentPatternIndex);
        }
        chaosButton.classList.add("active");
        setTimeout(() => chaosButton.classList.remove("active"), 150);
      });
    }
    sequencer.randomButton.addEventListener("click", () => {
      sequencer.generateRandomSequence();
    });
  });
  function setupDrumEffectsControls(synthEngine) {
    const effectControls = [
      { id: "drum-saturation", type: "saturation", valueId: "saturation-value" },
      { id: "drum-compression", type: "compression", valueId: "compression-value" },
      { id: "drum-filter", type: "filter", valueId: "filter-value" },
      { id: "drum-reverb", type: "reverb", valueId: "reverb-value" },
      { id: "drum-distortion", type: "distortion", valueId: "distortion-value" },
      { id: "drum-delay", type: "delay", valueId: "delay-value" },
      { id: "drum-chorus", type: "chorus", valueId: "chorus-value" },
      { id: "drum-eq", type: "eq", valueId: "eq-value" }
    ];
    effectControls.forEach((control) => {
      const slider = document.getElementById(control.id);
      const valueDisplay = document.getElementById(control.valueId);
      if (slider && valueDisplay) {
        slider.addEventListener("input", (e) => {
          const value = parseInt(e.target.value);
          valueDisplay.textContent = `${value}%`;
          synthEngine.updateDrumEffect(control.type, value);
        });
      }
    });
  }
})();

</script>
