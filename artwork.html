<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Artwork</title>

        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                background: white;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Helvetica Neue",
                    Helvetica, Arial, sans-serif;
                color: black;
            }

            .gallery {
                column-gap: 8px;
                padding: 8px 8px 84px;
                transition: column-count 0.18s ease;
            }

            .gallery.size-1 {
                column-count: 6;
            }

            .gallery.size-2 {
                column-count: 5;
            }

            .gallery.size-3 {
                column-count: 4;
            }

            @media (max-width: 1200px) {
                .gallery.size-1 {
                    column-count: 5;
                }
                .gallery.size-2 {
                    column-count: 4;
                }
                .gallery.size-3 {
                    column-count: 3;
                }
            }

            @media (max-width: 900px) {
                .gallery.size-1 {
                    column-count: 4;
                }
                .gallery.size-2 {
                    column-count: 3;
                }
                .gallery.size-3 {
                    column-count: 2;
                }
            }

            @media (max-width: 600px) {
                .gallery.size-1 {
                    column-count: 3;
                }
                .gallery.size-2 {
                    column-count: 2;
                }
                .gallery.size-3 {
                    column-count: 1;
                }
            }

            .item {
                break-inside: avoid;
                margin-bottom: 8px;
            }

            .item img {
                width: 100%;
                display: block;
                border-radius: 4px;
            }

            .bottom-bar {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                background: rgba(0, 0, 0, 0.85);
                backdrop-filter: blur(10px);
                padding: 12px 16px;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 14px;
                z-index: 1000;
                font-size: 14px;
                color: white;
            }

            .label {
                opacity: 0.9;
            }

            .size-slider {
                -webkit-appearance: none;
                appearance: none;
                width: 220px;
                height: 18px;
                background: transparent;
                outline: none;
            }

            .size-slider::-webkit-slider-runnable-track {
                height: 2px;
                background: rgba(255, 255, 255, 0.45);
            }

            .size-slider::-moz-range-track {
                height: 2px;
                background: rgba(255, 255, 255, 0.45);
            }

            .size-slider::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 14px;
                height: 14px;
                background: white;
                border-radius: 0;
                border: none;
                margin-top: -6px;
                cursor: pointer;
                transition: transform 0.12s ease;
            }

            .size-slider::-moz-range-thumb {
                width: 14px;
                height: 14px;
                background: white;
                border: none;
                border-radius: 0;
                cursor: pointer;
                transition: transform 0.12s ease;
            }

            .size-slider:active::-webkit-slider-thumb {
                transform: scale(1.08);
            }

            .size-slider:active::-moz-range-thumb {
                transform: scale(1.08);
            }
        </style>
    </head>

    <body>
        <div class="gallery size-3" id="gallery"></div>

        <div class="bottom-bar">
            <div class="label">Zoom</div>
            <input
                id="gridSlider"
                class="size-slider"
                type="range"
                min="1"
                max="3"
                step="1"
                value="3"
            />
        </div>

        <script>
            const folder = "images/art/Imagefx/";
            const gallery = document.getElementById("gallery");
            const slider = document.getElementById("gridSlider");

            function updateGrid() {
                gallery.classList.remove("size-1", "size-2", "size-3");
                gallery.classList.add(`size-${slider.value}`);
            }

            for (let i = 1; i <= 999; i++) {
                const num = String(i).padStart(3, "0");
                const file = `imagefx-${num}.webp`;

                const img = new Image();
                img.src = folder + file;

                img.onload = () => {
                    const div = document.createElement("div");
                    div.className = "item";
                    div.appendChild(img);
                    gallery.appendChild(div);
                };
            }

            slider.addEventListener("input", updateGrid);
            updateGrid();
        </script>
    </body>
</html>
